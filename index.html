<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中山據點記憶對對碰</title>
    <style>
        :root {
            --neon-cyan: #00e5ff;
            --neon-purple: #b000ff;
            --bg-dark: #0a0a1a;
            --panel-bg: rgba(10, 20, 40, 0.7);
            --text-main: #e0f7fa;
            --card-back-bg: #111b2b;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.15), transparent);
            border-bottom: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            width: 100%;
            text-align: center;
            padding: 15px 0;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.1);
            text-shadow: 0 0 10px var(--neon-cyan);
            letter-spacing: 2px;
        }

        h1 { margin: 0; font-size: 1.8rem; }

        .status-bar {
            background: rgba(0, 229, 255, 0.1);
            border-bottom: 1px solid rgba(0, 229, 255, 0.3);
            width: 100%;
            text-align: center;
            padding: 8px 0;
            font-weight: bold;
            color: var(--neon-cyan);
            min-height: 24px;
            letter-spacing: 1px;
        }

        .upload-section {
            background: var(--panel-bg);
            margin: 15px;
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px dashed var(--neon-cyan);
            box-shadow: inset 0 0 10px rgba(0, 229, 255, 0.1);
            text-align: center;
            max-width: 600px;
            backdrop-filter: blur(5px);
        }

        .upload-label {
            display: inline-block;
            background: transparent;
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 8px;
            transition: all 0.3s;
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.3) inset;
        }

        .upload-label:hover {
            background: rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.6) inset, 0 0 10px var(--neon-cyan);
        }

        #file-info {
            font-size: 0.85rem;
            color: #8ab4f8;
        }

        .stats-container {
            display: flex;
            gap: 20px;
            margin: 10px 0;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: monospace;
        }

        .stat-item {
            background: var(--panel-bg);
            padding: 8px 20px;
            border-radius: 4px;
            border: 1px solid rgba(0, 229, 255, 0.5);
            color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.1);
        }

        .controls {
            margin-bottom: 15px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border: 1px solid var(--neon-cyan);
            border-radius: 4px;
            background: rgba(0, 229, 255, 0.05);
            color: var(--neon-cyan);
            transition: all 0.3s;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 0 5px rgba(0, 229, 255, 0.3) inset;
        }

        button:hover { 
            background: rgba(0, 229, 255, 0.2); 
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.6) inset, 0 0 15px rgba(0, 229, 255, 0.4);
            text-shadow: 0 0 5px var(--neon-cyan);
        }
        button:active { transform: scale(0.95); }
        button:disabled { 
            border-color: #444; 
            color: #666; 
            background: transparent; 
            box-shadow: none; 
            cursor: not-allowed; 
            text-shadow: none;
        }

        /* 特別強調偷看按鈕 - 紫色霓虹 */
        #btn-peek {
            border-color: var(--neon-purple);
            color: #e5b3ff;
            background: rgba(176, 0, 255, 0.05);
            box-shadow: 0 0 5px rgba(176, 0, 255, 0.3) inset;
        }
        #btn-peek:hover:not(:disabled) { 
            background: rgba(176, 0, 255, 0.2);
            box-shadow: 0 0 15px rgba(176, 0, 255, 0.6) inset, 0 0 15px rgba(176, 0, 255, 0.4);
            text-shadow: 0 0 5px var(--neon-purple);
        }

        .game-board {
            display: grid;
            gap: 12px;
            perspective: 1000px;
            margin: 10px auto;
        }

        .card {
            width: 100px;
            height: 130px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card.flipped { transform: rotateY(180deg); }

        .card.matched {
            cursor: default;
            filter: grayscale(80%) opacity(0.4);
            pointer-events: none;
            box-shadow: none;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.3), inset 0 0 10px rgba(0, 229, 255, 0.1);
            overflow: hidden;
            background-color: var(--bg-dark);
        }

        .card-front {
            transform: rotateY(180deg);
            background-color: #000;
        }

        .card-image {
            width: 100%;
            height: 80%;
            object-fit: cover;
            opacity: 0.9;
        }

        .card-emoji { font-size: 3rem; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }

        .card-num-small {
            font-size: 0.75rem;
            background: rgba(0, 0, 0, 0.8);
            width: 100%;
            text-align: center;
            padding: 3px 0;
            color: var(--neon-cyan);
            font-family: monospace;
            letter-spacing: 1px;
            border-top: 1px solid rgba(0, 229, 255, 0.3);
        }

        .card-back {
            background: linear-gradient(135deg, var(--card-back-bg) 25%, transparent 25%) -10px 0,
                        linear-gradient(225deg, var(--card-back-bg) 25%, transparent 25%) -10px 0,
                        linear-gradient(315deg, var(--card-back-bg) 25%, transparent 25%),
                        linear-gradient(45deg, var(--card-back-bg) 25%, transparent 25%);
            background-size: 20px 20px;
            background-color: #050a14;
        }

        .card-num-large {
            font-size: 2.5rem;
            font-weight: 900;
            font-family: monospace;
            color: transparent;
            -webkit-text-stroke: 1px var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.6);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 5, 0.85);
            backdrop-filter: blur(3px);
            justify-content: center; align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--bg-dark);
            padding: 40px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2), inset 0 0 20px rgba(0, 229, 255, 0.1);
            max-width: 80%;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            text-align: center;
            color: rgba(0, 229, 255, 0.6);
            font-family: monospace;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .card { width: 75px; height: 105px; }
            .card-num-large { font-size: 1.8rem; }
            .card-emoji { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>⚡ 中山據點記憶對對碰 ⚡</h1>
    </header>

    <div class="status-bar" id="game-status">歡迎！請點擊下方上傳照片或選擇難度開始</div>

    <div class="upload-section">
        <label for="image-upload" class="upload-label">📁 上傳照片 (自訂模式)</label>
        <input type="file" id="image-upload" accept="image/*" multiple style="display: none;" onchange="handleImageUpload(event)">
        <div id="file-info">未選取照片（預設使用內建水果圖案）</div>
    </div>

    <div class="stats-container">
        <div class="stat-item">次數：<span id="moves">0</span></div>
        <div class="stat-item">計時：<span id="timer">0</span> 秒</div>
    </div>

    <div class="controls">
        <button onclick="prepareGame('easy')" id="btn-easy">簡單 (12張)</button>
        <button onclick="prepareGame('medium')" id="btn-medium">中等 (16張)</button>
        <button onclick="prepareGame('hard')" id="btn-hard">挑戰 (20張)</button>
        <button onclick="peekCards()" id="btn-peek" disabled>👀 再看 10 秒</button>
    </div>

    <div class="game-board" id="game-board"></div>

    <div class="modal" id="win-modal">
        <div class="modal-content">
            <h2 id="modal-title" style="font-size: 2.2rem; color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan);">太棒了！</h2>
            <p id="final-stats" style="font-size: 1.1rem; color: var(--text-main); margin-bottom: 20px;"></p>
            <button onclick="closeModal()">關閉視窗</button>
        </div>
    </div>

    <footer>
        設計者：鍾ＸＸ 治療師
    </footer>

    <script>
        const defaultEmojis = ['🍎', '🍌', '🍇', '🍓', '🍉', '🍍', '🍊', '🥝', '🥕', '🌽', '🥨', '🍦', '🍰', '🍔', '🍕', '⚽', '🚗', '🏠', '🎁', '🎈'];
        let userImages = []; 
        let flippedCards = [];
        let matchedCount = 0;
        let moves = 0;
        let timer = 0;
        let timerInterval;
        let isLock = true;
        let isPreviewing = false;
        let gameActive = false;

        const board = document.getElementById('game-board');
        const movesDisplay = document.getElementById('moves');
        const timerDisplay = document.getElementById('timer');
        const statusDisplay = document.getElementById('game-status');
        const winModal = document.getElementById('win-modal');
        const fileInfo = document.getElementById('file-info');
        const peekBtn = document.getElementById('btn-peek');

        function handleImageUpload(event) {
            const files = event.target.files;
            if (files.length === 0) return;
            userImages = [];
            Array.from(files).forEach(file => userImages.push(URL.createObjectURL(file)));
            fileInfo.innerText = `已讀取 ${userImages.length} 張照片。`;
            statusDisplay.innerText = `📸 照片已就緒！請選擇難度。`;
        }

        function prepareGame(difficulty) {
            if (isPreviewing) return;
            
            let pairsCount, cols;
            if (difficulty === 'easy') { pairsCount = 6; cols = 4; }
            else if (difficulty === 'medium') { pairsCount = 8; cols = 4; }
            else { pairsCount = 10; cols = 5; }

            let gameAssets = [];
            let usingCustom = false;

            if (userImages.length >= pairsCount) {
                gameAssets = userImages.slice(0, pairsCount);
                usingCustom = true;
            } else {
                if (userImages.length > 0) {
                    showCustomAlert(`照片張數不足！需要 ${pairsCount} 張，目前僅 ${userImages.length} 張，將使用內建圖案。`);
                }
                gameAssets = defaultEmojis.slice(0, pairsCount);
            }

            // 重置狀態
            clearInterval(timerInterval);
            board.innerHTML = '';
            moves = 0;
            timer = 0;
            matchedCount = 0;
            flippedCards = [];
            isLock = true;
            isPreviewing = true;
            gameActive = false;
            peekBtn.disabled = true;
            
            movesDisplay.innerText = moves;
            timerDisplay.innerText = timer;
            board.style.gridTemplateColumns = `repeat(${cols}, auto)`;

            const gameData = [...gameAssets, ...gameAssets];
            shuffle(gameData);

            gameData.forEach((asset, index) => {
                const cardNum = index + 1;
                const card = document.createElement('div');
                card.classList.add('card', 'flipped');
                card.dataset.value = asset;
                
                let contentHTML = usingCustom 
                    ? `<img src="${asset}" class="card-image">`
                    : `<div class="card-emoji">${asset}</div>`;

                card.innerHTML = `
                    <div class="card-face card-back">
                        <div class="card-num-large">${cardNum}</div>
                    </div>
                    <div class="card-face card-front">
                        ${contentHTML}
                        <div class="card-num-small">編號 ${cardNum}</div>
                    </div>
                `;
                card.addEventListener('click', () => handleCardClick(card));
                board.appendChild(card);
            });

            startPreviewCountdown(10);
        }

        function startPreviewCountdown(seconds) {
            let timeLeft = seconds;
            statusDisplay.innerText = `👁️ 觀察時間！請記住位置 (${timeLeft})`;
            const countdown = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    statusDisplay.innerText = `👁️ 觀察時間！請記住位置 (${timeLeft})`;
                } else {
                    clearInterval(countdown);
                    endPreview();
                }
            }, 1000);
        }

        function endPreview() {
            document.querySelectorAll('.card').forEach(card => card.classList.remove('flipped'));
            setTimeout(() => {
                isLock = false;
                isPreviewing = false;
                gameActive = true;
                peekBtn.disabled = false;
                statusDisplay.innerText = "🎮 遊戲開始！找出配對";
                startTimer();
            }, 600);
        }

        function peekCards() {
            if (isLock || isPreviewing || !gameActive) return;

            isLock = true;
            isPreviewing = true;
            peekBtn.disabled = true;
            
            const unmatchedCards = document.querySelectorAll('.card:not(.matched)');
            unmatchedCards.forEach(card => card.classList.add('flipped'));

            // 暫存目前的狀態文字
            const originalStatus = statusDisplay.innerText;
            let timeLeft = 10;
            statusDisplay.innerText = `👁️ 偷看時間！ (${timeLeft})`;

            const peekInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    statusDisplay.innerText = `👁️ 偷看時間！ (${timeLeft})`;
                } else {
                    clearInterval(peekInterval);
                    unmatchedCards.forEach(card => card.classList.remove('flipped'));
                    flippedCards = []; // 清空當前翻牌避免邏輯錯誤
                    
                    setTimeout(() => {
                        isLock = false;
                        isPreviewing = false;
                        peekBtn.disabled = false;
                        statusDisplay.innerText = "🎮 偷看結束，繼續遊戲！";
                    }, 600);
                }
            }, 1000);
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timer++;
                timerDisplay.innerText = timer;
            }, 1000);
        }

        function handleCardClick(card) {
            if (isLock || isPreviewing || card.classList.contains('flipped') || card.classList.contains('matched')) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                movesDisplay.innerText = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            isLock = true;
            const [c1, c2] = flippedCards;

            if (c1.dataset.value === c2.dataset.value) {
                setTimeout(() => {
                    c1.classList.add('matched');
                    c2.classList.add('matched');
                    matchedCount++;
                    flippedCards = [];
                    isLock = false;
                    statusDisplay.innerText = "✅ 太棒了！配對成功！";
                    if (matchedCount === document.querySelectorAll('.card').length / 2) endGame();
                }, 500);
            } else {
                statusDisplay.innerText = "❌ 再試一次看看！";
                setTimeout(() => {
                    c1.classList.remove('flipped');
                    c2.classList.remove('flipped');
                    flippedCards = [];
                    isLock = false;
                }, 1000);
            }
        }

        function endGame() {
            clearInterval(timerInterval);
            gameActive = false;
            peekBtn.disabled = true;
            statusDisplay.innerText = "🏆 恭喜完成！";
            document.getElementById('modal-title').innerText = "🏆 挑戰成功！";
            document.getElementById('final-stats').innerText = `總共翻牌 ${moves} 次，耗時 ${timer} 秒。`;
            winModal.style.display = 'flex';
        }

        function showCustomAlert(msg) {
            document.getElementById('modal-title').innerText = "提示";
            document.getElementById('final-stats').innerText = msg;
            winModal.style.display = 'flex';
        }

        function closeModal() { winModal.style.display = 'none'; }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
    </script>
</body>
</html>
